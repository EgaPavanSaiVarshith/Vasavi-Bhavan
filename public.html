<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Membership Approvals | SVKP Kalyana Mandapam</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #880E4F; --primary-light: #C2185B;
            --bg: #0f0f13; --surface: #1a1a24; --surface2: #222232;
            --border: rgba(255,255,255,0.08); --text: #f0f0f8;
            --text-sec: rgba(240,240,255,0.6);
            --success: #2e7d32; --error: #c62828; --warn: #e65100;
            --radius: 12px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

        /* ===== LOGIN SCREEN ===== */
        #loginScreen {
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 24px;
        }
        .login-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px 36px;
            width: 100%; max-width: 400px;
            text-align: center;
        }
        .login-box .logo { font-size: 2.5rem; margin-bottom: 12px; }
        .login-box h1 { font-family:'Poppins',sans-serif; font-size:1.1rem; color:#fff; line-height:1.4; }
        .login-box p { font-size:0.78rem; color:var(--text-sec); margin: 8px 0 28px; }
        .login-input {
            width:100%; padding:12px 16px; margin-bottom:12px;
            background:var(--surface2); border:1px solid var(--border);
            border-radius:8px; color:var(--text); font-size:0.9rem;
            font-family:'Inter',sans-serif; outline:none;
            transition:border-color 0.2s;
        }
        .login-input:focus { border-color:var(--primary-light); }
        .login-btn {
            width:100%; padding:12px;
            background:linear-gradient(135deg,var(--primary),var(--primary-light));
            border:none; border-radius:8px; color:#fff;
            font-size:0.95rem; font-weight:700; font-family:'Poppins',sans-serif;
            cursor:pointer; transition:opacity 0.2s;
        }
        .login-btn:hover { opacity:0.9; }
        .login-error { color:#ff5252; font-size:0.8rem; margin-top:8px; min-height:20px; }

        /* ===== APPROVALS SCREEN ===== */
        #approvalsScreen { display:none; }
        .top-bar {
            background:var(--surface);
            border-bottom:1px solid var(--border);
            padding: 14px 24px;
            display:flex; align-items:center; justify-content:space-between;
            position:sticky; top:0; z-index:100;
        }
        .top-bar-left { display:flex; align-items:center; gap:12px; }
        .top-bar h2 { font-size:1rem; font-weight:700; }
        .badge { background:var(--primary); color:#fff; font-size:0.7rem; font-weight:700; padding:2px 8px; border-radius:20px; }
        .logout-btn {
            background:transparent; border:1px solid var(--border);
            color:var(--text-sec); padding:6px 14px; border-radius:8px;
            cursor:pointer; font-size:0.8rem; transition:all 0.2s;
        }
        .logout-btn:hover { border-color:var(--primary-light); color:#fff; }

        .page-body { max-width: 900px; margin: 0 auto; padding: 24px 16px 60px; }
        .page-title { font-family:'Poppins',sans-serif; font-size:1.3rem; font-weight:700; margin-bottom:4px; }
        .page-sub { color:var(--text-sec); font-size:0.82rem; margin-bottom:24px; }

        /* ===== STATS ROW ===== */
        .stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:24px; }
        .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; text-align:center; }
        .stat-num { font-size:1.8rem; font-weight:700; font-family:'Poppins',sans-serif; }
        .stat-label { font-size:0.72rem; color:var(--text-sec); text-transform:uppercase; letter-spacing:1px; margin-top:4px; }
        .stat-pending .stat-num { color:#FF9800; }
        .stat-approved .stat-num { color:#4CAF50; }
        .stat-rejected .stat-num { color:#ef5350; }

        /* ===== FILTER TABS ===== */
        .filter-tabs { display:flex; gap:8px; margin-bottom:20px; }
        .tab-btn {
            padding:6px 18px; border-radius:20px; border:1px solid var(--border);
            background:transparent; color:var(--text-sec); font-size:0.82rem;
            cursor:pointer; transition:all 0.2s;
        }
        .tab-btn.active { background:var(--primary); border-color:var(--primary); color:#fff; font-weight:600; }

        /* ===== APPLICATION CARDS ===== */
        #cardList { display:flex; flex-direction:column; gap:16px; }
        .app-card {
            background:var(--surface);
            border:1px solid var(--border);
            border-radius:var(--radius);
            overflow:hidden;
        }
        .app-card-header {
            padding:16px 20px;
            display:flex; align-items:center; gap:14px;
            border-bottom:1px solid var(--border);
        }
        .app-photo {
            width:56px; height:64px; border-radius:8px; object-fit:cover;
            border:2px solid var(--border); flex-shrink:0;
            background:var(--surface2); display:flex; align-items:center;
            justify-content:center; font-size:1.5rem;
        }
        .app-photo img { width:100%; height:100%; object-fit:cover; border-radius:6px; }
        .app-name { font-size:1rem; font-weight:700; }
        .app-meta { font-size:0.78rem; color:var(--text-sec); margin-top:2px; }
        .status-pill {
            margin-left:auto; padding:4px 12px; border-radius:20px;
            font-size:0.72rem; font-weight:700; text-transform:uppercase;
            flex-shrink:0;
        }
        .status-pill.pending { background:rgba(255,152,0,0.15); color:#FF9800; border:1px solid rgba(255,152,0,0.3); }
        .status-pill.approved { background:rgba(76,175,80,0.15); color:#4CAF50; border:1px solid rgba(76,175,80,0.3); }
        .status-pill.rejected { background:rgba(239,83,80,0.15); color:#ef5350; border:1px solid rgba(239,83,80,0.3); }

        .app-card-body { padding: 16px 20px; }
        .details-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:8px 20px; margin-bottom:16px; }
        .detail-row { display:flex; flex-direction:column; gap:2px; }
        .detail-lbl { font-size:0.68rem; color:var(--text-sec); text-transform:uppercase; letter-spacing:0.5px; }
        .detail-val { font-size:0.85rem; font-weight:600; }

        .doc-row { display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap; }
        .doc-btn {
            padding:6px 14px; border-radius:8px;
            background:var(--surface2); border:1px solid var(--border);
            color:var(--text-sec); font-size:0.78rem; cursor:pointer;
            transition:all 0.2s; display:flex; align-items:center; gap:6px;
        }
        .doc-btn:hover { border-color:var(--primary-light); color:#fff; }

        .action-row { display:flex; gap:10px; }
        .btn-approve {
            flex:1; padding:10px; border-radius:8px; border:none;
            background:linear-gradient(135deg,#2e7d32,#43a047);
            color:#fff; font-weight:700; font-size:0.88rem;
            cursor:pointer; transition:all 0.2s;
        }
        .btn-approve:hover { transform:translateY(-1px); box-shadow:0 4px 16px rgba(46,125,50,0.4); }
        .btn-reject {
            flex:1; padding:10px; border-radius:8px; border:none;
            background:linear-gradient(135deg,#c62828,#ef5350);
            color:#fff; font-weight:700; font-size:0.88rem;
            cursor:pointer; transition:all 0.2s;
        }
        .btn-reject:hover { transform:translateY(-1px); box-shadow:0 4px 16px rgba(198,40,40,0.4); }

        .empty-state {
            text-align:center; padding:60px 24px;
            color:var(--text-sec); font-size:0.9rem;
        }
        .empty-state .empty-icon { font-size:3rem; margin-bottom:12px; }

        /* ===== IMAGE MODAL ===== */
        .modal-overlay {
            display:none; position:fixed; inset:0;
            background:rgba(0,0,0,0.85); z-index:9999;
            align-items:center; justify-content:center;
        }
        .modal-overlay.show { display:flex; }
        .modal-img-wrap { position:relative; max-width:90vw; max-height:90vh; }
        .modal-img-wrap img { max-width:87vw; max-height:85vh; object-fit:contain; border-radius:8px; }
        .modal-close {
            position:absolute; top:-12px; right:-12px;
            background:var(--primary); border:none; color:#fff;
            width:32px; height:32px; border-radius:50%;
            font-size:1rem; cursor:pointer;
        }

        /* ===== LOADING ===== */
        .loading { text-align:center; padding:48px; color:var(--text-sec); }
        .spin { display:inline-block; width:36px; height:36px; border:3px solid rgba(255,255,255,0.1); border-top-color:var(--primary-light); border-radius:50%; animation:spin 0.8s linear infinite; margin-bottom:12px; }
        @keyframes spin { to { transform:rotate(360deg); } }

        /* ===== TOAST ===== */
        .toast-c { position:fixed; bottom:24px; right:24px; z-index:9998; display:flex; flex-direction:column; gap:8px; }
        .toast { display:flex; align-items:center; gap:10px; padding:12px 18px; border-radius:10px; background:var(--surface2); border:1px solid var(--border); font-size:0.85rem; animation:slideIn 0.3s ease; }
        .toast.ok { border-color:rgba(76,175,80,0.4); }
        .toast.err { border-color:rgba(255,82,82,0.4); }
        @keyframes slideIn { from { transform:translateX(120%); } to { transform:translateX(0); } }

        @media(max-width:600px) {
            .stats-row { grid-template-columns:repeat(3,1fr); gap:8px; }
            .stat-num { font-size:1.3rem; }
            .details-grid { grid-template-columns:1fr; }
            .action-row { flex-direction:column; }
        }
    </style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div id="loginScreen">
    <div class="login-box">
        <div class="logo">🏛️</div>
        <h1>SVKP Kalyana Mandapam<br>Committee Portal</h1>
        <p>Sign in to review and approve membership applications</p>
        <input class="login-input" type="text" id="loginUser" placeholder="Username">
        <input class="login-input" type="password" id="loginPass" placeholder="Password" onkeydown="if(event.key==='Enter') doLogin()">
        <button class="login-btn" onclick="doLogin()">Sign In → Review Applications</button>
        <div class="login-error" id="loginErr"></div>
    </div>
</div>

<!-- ===== APPROVALS PORTAL ===== -->
<div id="approvalsScreen">
    <div class="top-bar">
        <div class="top-bar-left">
            <span>🏛️</span>
            <h2>Membership Approvals <span class="badge" id="pendingCountBadge">0</span></h2>
        </div>
        <button class="logout-btn" onclick="doLogout()">Logout</button>
    </div>

    <div class="page-body">
        <p class="page-sub">Review applications submitted by the public and approve or reject them.</p>

        <!-- Stats -->
        <div class="stats-row">
            <div class="stat-card stat-pending"><div class="stat-num" id="statPending">—</div><div class="stat-label">Pending</div></div>
            <div class="stat-card stat-approved"><div class="stat-num" id="statApproved">—</div><div class="stat-label">Approved</div></div>
            <div class="stat-card stat-rejected"><div class="stat-num" id="statRejected">—</div><div class="stat-label">Rejected</div></div>
        </div>

        <!-- Filter -->
        <div class="filter-tabs">
            <button class="tab-btn active" onclick="setFilter('pending',this)">⏳ Pending</button>
            <button class="tab-btn" onclick="setFilter('approved',this)">✅ Approved</button>
            <button class="tab-btn" onclick="setFilter('rejected',this)">❌ Rejected</button>
            <button class="tab-btn" onclick="setFilter('all',this)">📋 All</button>
        </div>

        <div id="cardList">
            <div class="loading"><div class="spin"></div><br>Loading applications...</div>
        </div>
    </div>
</div>

<!-- Image Modal -->
<div class="modal-overlay" id="imgModal" onclick="if(event.target===this)closeModal()">
    <div class="modal-img-wrap">
        <button class="modal-close" onclick="closeModal()">✕</button>
        <img id="modalImg" src="" alt="Document">
    </div>
</div>

<div class="toast-c" id="toastC"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = "https://kgdkogczvsmbbptiuzap.supabase.co";
    const SUPABASE_KEY = "sb_publishable_ClfcDfNddcRaO0NA5hkXlw_GFCOJkOC";
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const CREDS = { username: 'admin', password: 'vasavi123' };
    var allApps = [];
    var currentFilter = 'pending';

    // ===== AUTH =====
    if (sessionStorage.getItem('approval_auth') === 'true') showPortal();

    function doLogin() {
        var u = document.getElementById('loginUser').value.trim();
        var p = document.getElementById('loginPass').value.trim();
        var err = document.getElementById('loginErr');
        if (u === CREDS.username && p === CREDS.password) {
            sessionStorage.setItem('approval_auth', 'true');
            showPortal();
        } else {
            err.textContent = '❌ Invalid username or password';
            document.getElementById('loginPass').value = '';
        }
    }

    function doLogout() {
        sessionStorage.removeItem('approval_auth');
        document.getElementById('approvalsScreen').style.display = 'none';
        document.getElementById('loginScreen').style.display = 'flex';
    }

    function showPortal() {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('approvalsScreen').style.display = 'block';
        loadApplications();
    }

    // ===== LOAD DATA =====
    async function loadApplications() {
        var { data, error } = await db.from('vasavi_members').select('id,name,phone,dob,father_name,gothram,blood_group,address,status,photo,aadhaar,payment_proof,created_at').order('created_at', { ascending: false });
        if (error) { toast('Error loading: ' + error.message, 'err'); return; }
        allApps = data || [];
        updateStats();
        renderCards(currentFilter);
    }

    function updateStats() {
        var p = allApps.filter(function(a){return a.status==='pending';}).length;
        var ap = allApps.filter(function(a){return a.status==='approved';}).length;
        var r = allApps.filter(function(a){return a.status==='rejected';}).length;
        document.getElementById('statPending').textContent = p;
        document.getElementById('statApproved').textContent = ap;
        document.getElementById('statRejected').textContent = r;
        document.getElementById('pendingCountBadge').textContent = p;
        document.getElementById('pendingCountBadge').style.display = p > 0 ? 'inline' : 'none';
    }

    function setFilter(f, btn) {
        currentFilter = f;
        document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
        btn.classList.add('active');
        renderCards(f);
    }

    function renderCards(filter) {
        var list = document.getElementById('cardList');
        var filtered = filter === 'all' ? allApps : allApps.filter(function(a){ return a.status === filter; });

        if (!filtered.length) {
            list.innerHTML = '<div class="empty-state"><div class="empty-icon">' + (filter==='pending'?'🎉':'📋') + '</div>' +
                (filter==='pending' ? '<p>No pending applications! All caught up.</p>' : '<p>No applications in this category.</p>') + '</div>';
            return;
        }

        list.innerHTML = filtered.map(function(app) {
            var dob = app.dob ? new Date(app.dob).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}) : '—';
            var date = new Date(app.created_at).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
            var photoHtml = app.photo
                ? '<div class="app-photo"><img src="' + app.photo + '" alt="photo"></div>'
                : '<div class="app-photo">👤</div>';
            var statusPill = '<span class="status-pill ' + app.status + '">' + app.status + '</span>';

            var aadhaarBtn = app.aadhaar ? '<button class="doc-btn" onclick="viewDoc(\'' + app.id + '\',\'aadhaar\')">🪪 View Aadhaar</button>' : '';
            var payBtn = app.payment_proof ? '<button class="doc-btn" onclick="viewDoc(\'' + app.id + '\',\'payment\')">🧾 View Payment</button>' : '';

            var actionBtns = app.status === 'pending'
                ? '<div class="action-row">' +
                  '<button class="btn-approve" onclick="updateStatus(\'' + app.id + '\',\'approved\')">✅ Approve</button>' +
                  '<button class="btn-reject" onclick="updateStatus(\'' + app.id + '\',\'rejected\')">❌ Reject</button>' +
                  '</div>'
                : '<div style="text-align:center;padding:8px;font-size:0.8rem;color:var(--text-sec)">Status: <strong style="color:' + (app.status==='approved'?'#4CAF50':'#ef5350') + '">' + app.status.toUpperCase() + '</strong></div>';

            return '<div class="app-card" id="card-' + app.id + '">' +
                '<div class="app-card-header">' +
                    photoHtml +
                    '<div><div class="app-name">' + (app.name || '—') + '</div>' +
                    '<div class="app-meta">📱 ' + (app.phone || '—') + ' &nbsp;|&nbsp; 📅 Applied: ' + date + '</div></div>' +
                    statusPill +
                '</div>' +
                '<div class="app-card-body">' +
                    '<div class="details-grid">' +
                        '<div class="detail-row"><span class="detail-lbl">Date of Birth</span><span class="detail-val">' + dob + '</span></div>' +
                        '<div class="detail-row"><span class="detail-lbl">Father\'s Name</span><span class="detail-val">' + (app.father_name || '—') + '</span></div>' +
                        '<div class="detail-row"><span class="detail-lbl">Gothram</span><span class="detail-val">' + (app.gothram || '—') + '</span></div>' +
                        '<div class="detail-row"><span class="detail-lbl">Blood Group</span><span class="detail-val">' + (app.blood_group || '—') + '</span></div>' +
                        '<div class="detail-row" style="grid-column:span 2"><span class="detail-lbl">Address</span><span class="detail-val">' + (app.address || '—') + '</span></div>' +
                    '</div>' +
                    (aadhaarBtn || payBtn ? '<div class="doc-row">' + aadhaarBtn + payBtn + '</div>' : '') +
                    actionBtns +
                '</div>' +
            '</div>';
        }).join('');
    }

    // ===== APPROVE / REJECT =====
    async function updateStatus(id, status) {
        var card = document.getElementById('card-' + id);
        if (card) { card.style.opacity = '0.5'; card.style.pointerEvents = 'none'; }

        var { error } = await db.from('vasavi_members').update({ status: status }).eq('id', id);
        if (error) {
            toast('Error: ' + error.message, 'err');
            if (card) { card.style.opacity = '1'; card.style.pointerEvents = 'auto'; }
            return;
        }
        var app = allApps.find(function(a){ return String(a.id) === String(id); });
        if (app) app.status = status;
        updateStats();
        renderCards(currentFilter);
        toast(status === 'approved' ? '✅ Application Approved!' : '❌ Application Rejected', status === 'approved' ? 'ok' : 'err');
    }

    // ===== VIEW DOCUMENT =====
    function viewDoc(id, type) {
        var app = allApps.find(function(a){ return String(a.id) === String(id); });
        if (!app) return;
        var src = type === 'aadhaar' ? app.aadhaar : app.payment_proof;
        if (!src) return;
        document.getElementById('modalImg').src = src;
        document.getElementById('imgModal').classList.add('show');
    }
    function closeModal() { document.getElementById('imgModal').classList.remove('show'); }

    // ===== TOAST =====
    function toast(msg, type) {
        var c = document.getElementById('toastC');
        var t = document.createElement('div');
        t.className = 'toast ' + (type || '');
        t.textContent = msg;
        c.appendChild(t);
        setTimeout(function(){ t.remove(); }, 4000);
    }
</script>
</body>
</html>
