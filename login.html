<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login - Sri Vasavi Kanyakaparameshwari Kalyana Mandapam Committee">
    <title>Login | SVKP Kalyana Mandapam</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="login.css">
</head>

<body>
    <!-- Vasavi Background -->
    <div class="vasavi-bg"></div>
    <!-- Particles -->
    <div class="particles" id="particles"></div>
    <div class="deco-ring ring-1"></div>
    <div class="deco-ring ring-2"></div>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="card-glow"></div>

            <!-- Header -->
            <div class="login-header">
                <div class="logo-wrap">
                    <div class="logo-circle"><span>🙏</span></div>
                    <div class="logo-ripple"></div>
                </div>
                <h1 class="login-title" style="font-size:1.15rem;line-height:1.4">SRI VASAVI KANYAKA
                    PARAMESHWERI<br>KALYANA MANDAPAM COMITEE</h1>
                <h2 class="login-subtitle" style="font-size:0.75rem;line-height:1.5;margin-top:8px">H.NO-- 5-12,
                    KUSUMANCHI ROAD, NELAKONDAPALLY,<br>KHAMMAM DIST - REGISTERED NUMBER 56/2026</h2>
                <div class="ornament">
                    <span class="orn-line"></span>
                    <span class="orn-dot">◆</span>
                    <span class="orn-line"></span>
                </div>
                <p class="login-tag">Membership Management Portal</p>
            </div>

            <!-- Form -->
            <form class="login-form" id="loginForm" novalidate>
                <div class="input-group" id="grpUser">
                    <div class="input-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
                            <circle cx="12" cy="7" r="4" />
                        </svg>
                    </div>
                    <input type="text" id="username" placeholder="Username" autocomplete="username" required>
                    <div class="focus-line"></div>
                </div>

                <div class="input-group" id="grpPass">
                    <div class="input-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" />
                            <path d="M7 11V7a5 5 0 0110 0v4" />
                        </svg>
                    </div>
                    <input type="password" id="password" placeholder="Password" autocomplete="current-password"
                        required>
                    <button type="button" class="eye-btn" id="eyeBtn" aria-label="Toggle password">
                        <svg class="eye-on" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                            <circle cx="12" cy="12" r="3" />
                        </svg>
                        <svg class="eye-off" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" style="display:none">
                            <path
                                d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24" />
                            <line x1="1" y1="1" x2="23" y2="23" />
                        </svg>
                    </button>
                    <div class="focus-line"></div>
                </div>

                <div class="error-box" id="errorBox">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10" />
                        <line x1="15" y1="9" x2="9" y2="15" />
                        <line x1="9" y1="9" x2="15" y2="15" />
                    </svg>
                    <span id="errorText"></span>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">
                    <span class="btn-label">Sign In</span>
                    <span class="btn-dots"><span></span><span></span><span></span></span>
                </button>
            </form>

            <div class="login-footer">
                <p>🙏 Sri Vasavi Kanyakaparameshwari Kalyana Mandapam</p>
            </div>

        </div>
    </div>

    <script>
        // ===== Auth check =====
        if (sessionStorage.getItem('vasavi_auth') === 'true') {
            window.location.href = 'index.html';
        }

        // ===== Particles =====
        (function () {
            var c = document.getElementById('particles');
            for (var i = 0; i < 15; i++) {
                var p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDuration = (10 + Math.random() * 15) + 's';
                p.style.animationDelay = Math.random() * 8 + 's';
                var s = (2 + Math.random() * 3) + 'px';
                p.style.width = s; p.style.height = s;
                c.appendChild(p);
            }
        })();

        // ===== DOM =====
        var form = document.getElementById('loginForm');
        var uInput = document.getElementById('username');
        var pInput = document.getElementById('password');
        var loginBtn = document.getElementById('loginBtn');
        var errorBox = document.getElementById('errorBox');
        var errorText = document.getElementById('errorText');
        var eyeBtn = document.getElementById('eyeBtn');

        // ===== Credentials =====
        var CREDS = { username: 'admin', password: 'vasavi123' };

        // ===== Toggle password =====
        eyeBtn.addEventListener('click', function () {
            var show = pInput.type === 'password';
            pInput.type = show ? 'text' : 'password';
            eyeBtn.querySelector('.eye-on').style.display = show ? 'none' : 'block';
            eyeBtn.querySelector('.eye-off').style.display = show ? 'block' : 'none';
        });

        // ===== Clear errors =====
        uInput.addEventListener('input', clearErr);
        pInput.addEventListener('input', clearErr);
        function clearErr() {
            errorBox.classList.remove('show');
            document.getElementById('grpUser').classList.remove('error');
            document.getElementById('grpPass').classList.remove('error');
        }

        // ===== Submit =====
        form.addEventListener('submit', function (e) {
            e.preventDefault();
            var u = uInput.value.trim();
            var p = pInput.value.trim();

            if (!u || !p) {
                showErr('Please enter both username and password');
                if (!u) document.getElementById('grpUser').classList.add('error');
                if (!p) document.getElementById('grpPass').classList.add('error');
                shake(); return;
            }

            loginBtn.classList.add('loading');
            loginBtn.disabled = true;

            setTimeout(function () {
                if (u === CREDS.username && p === CREDS.password) {
                    sessionStorage.setItem('vasavi_auth', 'true');
                    sessionStorage.setItem('vasavi_user', u);
                    window.location.href = 'index.html';
                } else {
                    loginBtn.classList.remove('loading');
                    loginBtn.disabled = false;
                    showErr('Invalid username or password');
                    document.getElementById('grpUser').classList.add('error');
                    document.getElementById('grpPass').classList.add('error');
                    shake();
                    pInput.value = ''; pInput.focus();
                }
            }, 1000);
        });

        function showErr(msg) { errorText.textContent = msg; errorBox.classList.add('show'); }
        function shake() {
            var card = document.querySelector('.login-card');
            card.classList.add('shake');
            setTimeout(function () { card.classList.remove('shake'); }, 600);
        }

        uInput.focus();
    </script>
</body>

</html>
